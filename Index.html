<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Funnel Link Profile</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
overflow-x:hidden;
transition:0.4s;
}

body.visual{
background:#000;
}

/* TOP BAR */
.topbar{
position:sticky;
top:0;
display:flex;
gap:10px;
padding:10px;
background:#111;
border-bottom:1px solid #222;
align-items:center;
z-index:10;
}

#clock{color:#00e5ff;min-width:90px;font-size:14px}

#search{
flex:1;
padding:10px;
border-radius:10px;
border:none;
background:#222;
color:#fff;
}

#modeBtn, #login{
background:none;
color:#00e5ff;
border:none;
cursor:pointer;
}

/* CHANNEL BAR */
#channels{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#0f0f0f;
border-bottom:1px solid #222;
justify-content:center;
}

.channel{
cursor:pointer;
font-size:18px;
white-space:nowrap;
}

/* CARD */
.card{
max-width:500px;
margin:20px auto;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
text-align:center;
}

/* MEDIA */
#mediaBox{
width:80%;
aspect-ratio:1/1;
margin:10px auto;
border-radius:20px;
overflow:hidden;
position:relative;
border:2px solid #00e5ff;
background:#111;
}

#img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
}

#hexPanel{
display:none;
position:absolute;
inset:0;
background:#111;
padding:10px;
font-size:12px;
overflow:auto;
}

body.visual #hexPanel{
display:flex;
flex-direction:column;
}

body.visual #img{
opacity:0;
}

/* VISUAL MODE HIDE UI */
body.visual .card,
body.visual #channels,
body.visual .topbar{
display:none !important;
}

/* QR */
#qr{
display:none;
position:absolute;
inset:0;
align-items:center;
justify-content:center;
background:#000;
}

#qr img{
width:100%;
height:100%;
object-fit:contain;
}

/* BUTTONS */
.btn{
display:block;
margin:10px auto;
padding:12px;
border-radius:10px;
text-decoration:none;
width:90%;
}

.primary{background:#00e5ff;color:#000}
.secondary{background:#ff00d4;color:#fff}
</style>
</head>

<body>

<div class="topbar">
<div id="clock"></div>
<input id="search" placeholder="Search Funnels"/>
<button id="modeBtn">Visual Mode</button>
<button id="login">Login</button>
</div>
<img href="https://github.com/mattyd1989777-coder/Funnel_Link-_Generator/tree/main/1781417085778.png">
<div id="channels"></div>

<div class="card">

<div id="visitors">Visitors: 0</div>

<div id="mediaBox" ondblclick="toggleMedia()">

<img id="img" src="https://picsum.photos/300"/>

<div id="hexPanel">
<div id="hexBox"></div>
<div id="qr"></div>
</div>

</div>

<h2 id="name">User</h2>
<p>Live Funnel</p>

<a class="btn primary">Visit Funnel</a>
<a class="btn secondary">Instagram</a>

</div>

<script>
let mode="normal";
let isLoggedIn=false;
let showQR=false;
let lastTap=0;

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerText=
new Date().toLocaleTimeString();
},1000);

/* LOGIN */
document.getElementById("login").onclick=()=>{
isLoggedIn=true;
alert("Logged in");
};

/* VISUAL MODE */
document.getElementById("modeBtn").onclick=()=>{
if(!isLoggedIn){
alert("Login required");
return;
}
mode = mode==="normal" ? "visual" : "normal";
document.body.classList.toggle("visual");
document.getElementById("modeBtn").innerText =
mode==="visual" ? "Exit Mode" : "Visual Mode";
};

/* CHANNELS */
const channels=[
{name:"Web",img:"https://picsum.photos/300?1"},
{name:"Video",img:"https://picsum.photos/300?2"},
{name:"Game",img:"https://picsum.photos/300?3"},
{name:"Map",img:"https://picsum.photos/300?4"}
];

const bar=document.getElementById("channels");

channels.forEach((c,i)=>{
let d=document.createElement("div");
d.className="channel";
d.innerText=c.name;
d.onclick=()=>load(i);
bar.appendChild(d);
});

/* LOAD */
function load(i){
document.getElementById("name").innerText=channels[i].name;
document.getElementById("img").src=channels[i].img;
updateHex();
}
load(0);

/* HEX */
function makeHex(seed){
let base=[...seed].reduce((a,c)=>a+c.charCodeAt(0),0);
let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

return (
letters[base%26] +
letters[(base/2)%26|0] +
letters[(base/3)%26|0] +
"-" + (base*9973).toString().slice(0,10)
);
}

let history=[];

function updateHex(){
let hex=makeHex("user@email.com"+Date.now()+visitors);

history.unshift(hex);
if(history.length>3) history.pop();

document.getElementById("hexBox").innerText=history.join("\n");
generateQR();
}

/* QR */
function generateQR(){
document.getElementById("qr").innerHTML=
`<img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(location.href)}">`;
}

/* VISITORS */
let visitors=Number(localStorage.getItem("v")||0);
visitors++;
localStorage.setItem("v",visitors);
document.getElementById("visitors").innerText="Visitors: "+visitors;

/* MEDIA TOGGLE */
function toggleMedia(){
showQR=!showQR;

document.getElementById("img").style.opacity=showQR?"0":"1";
document.getElementById("qr").style.display=showQR?"flex":"none";

if(showQR) generateQR();
}
</script>
<script>

  function generateSwitchKey(email, phone, name){
let raw = email + phone + name;
let hash = 0;

for(let i=0;i<raw.length;i++){
hash = (hash << 5) - hash + raw.charCodeAt(i);
hash |= 0;
}

return "FLX-" + Math.abs(hash);
}
</script>

  <script>

</body>
</html>
